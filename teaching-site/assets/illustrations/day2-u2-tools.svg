<text x="400" y="50" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">domain object、MCP server、RAG store 各自提供不同性質的工具</text>

    <rect x="60" y="100" width="200" height="90" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="160" y="129" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#2563eb">Java Domain Object</text><text x="160" y="145" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#2563eb">@Tool 方法</text><text x="160" y="161" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#2563eb">(物件內部狀態)</text>
    <rect x="60" y="220" width="200" height="90" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="160" y="249" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#7c3aed">MCP Server</text><text x="160" y="265" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#7c3aed">(跨應用・跨 runtime</text><text x="160" y="281" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#7c3aed">發現與重用)</text>
    <rect x="540" y="160" width="210" height="90" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="645" y="196.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#d97706">Agent Action</text><text x="645" y="213.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#d97706">最小工具暴露</text>
    <rect x="300" y="300" width="200" height="70" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="400" y="327" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#16a34a">RAG Store (ToolishRag)</text><text x="400" y="343" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#16a34a">LLM 自行決定怎麼搜</text>
