<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><polygon points="0,0 10,5 0,10" fill="#64748b"/></marker></defs>
<rect width="800" height="400" rx="12" fill="#f8fafc"/>
<text x="400" y="30" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="15" font-weight="700" fill="#0f172a">action 的條件結構</text>
<text x="400" y="50" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">preconditions → action → postconditions，planner 以此串出到 goal 的路</text>

    <rect x="45" y="160" width="180" height="80" rx="40" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="135" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#2563eb">Preconditions</text><text x="135" y="208" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#2563eb">執行前必須滿足</text>
    <rect x="290" y="150" width="170" height="100" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="375" y="191.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#7c3aed">Action</text><text x="375" y="208.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#7c3aed">可執行步驟</text>
    <rect x="525" y="160" width="180" height="80" rx="40" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="615" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#d97706">Postconditions</text><text x="615" y="208" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#d97706">執行後產生的事實</text>
    <polygon points="480,288 565,320 480,352 395,320" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="480" y="320" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#d97706">滿足 goal？</text>
    <polygon points="198,290 332,290 350,320 332,350 198,350 180,320" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="265" y="320" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#16a34a">Goal 達成</text>
    <line x1="229" y1="200" x2="286" y2="200" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="462" y1="200" x2="521" y2="200" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="600" y1="244" x2="510" y2="292" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="391" y1="320" x2="358" y2="320" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <text x="340" y="300" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#16a34a">是</text>
    <text x="580" y="290" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">否 → replanning</text>
    <text x="135" y="140" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">world state 已知事實</text>
    
    <rect x="240" y="370" width="76" height="22" rx="11" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="278" y="381" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="10" font-weight="700" fill="#2563eb">條件/狀態</text>
    <rect x="330" y="370" width="60" height="22" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="360" y="381" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="10" font-weight="700" fill="#7c3aed">Action</text>
    <polygon points="414.8,370 453.2,370 464,381 453.2,392 414.8,392 404,381" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="434" y="381" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="10" font-weight="700" fill="#16a34a">Goal</text>
    <polygon points="508,368 536,381 508,394 480,381" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="508" y="381" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="10" font-weight="700" fill="#d97706">決策</text>
  
</svg>