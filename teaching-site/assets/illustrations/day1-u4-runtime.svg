<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><polygon points="0,0 10,5 0,10" fill="#64748b"/></marker></defs>
<rect width="800" height="400" rx="12" fill="#f8fafc"/>
<text x="400" y="30" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="15" font-weight="700" fill="#0f172a">AgentProcess 執行迴圈</text>
<text x="400" y="50" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">一次 agent 任務的容器：plan → 執行 → 更新 → 重新檢查</text>

    <rect x="320" y="80" width="160" height="54" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="400" y="98.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#7c3aed">Plan</text><text x="400" y="115.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#7c3aed">(GOAP 規劃)</text>
    <rect x="560" y="170" width="170" height="54" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="645" y="197" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#2563eb">Execute Action</text>
    <rect x="320" y="270" width="160" height="54" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="400" y="288.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#d97706">Update</text><text x="400" y="305.5" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#d97706">Blackboard</text>
    <polygon points="155,162 245,197 155,232 65,197" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="155" y="197" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#16a34a">Goal 達成？</text>
    <line x1="484" y1="120" x2="600" y2="166" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="620" y1="228" x2="484" y2="285" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="316" y1="290" x2="180" y2="228" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="180" y1="166" x2="316" y2="112" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <text x="580" y="135" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">執行一步</text>
    <text x="560" y="280" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">結果寫回</text>
    <text x="215" y="270" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">重新檢查狀態</text>
    <text x="215" y="130" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">未達成 → replan</text>
    <text x="400" y="375" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="600" fill="#64748b">AgentProcess 內含：user input・goal・plan・blackboard・事件・終止狀態</text>
  
</svg>