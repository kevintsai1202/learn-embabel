    <rect x="325" y="130" width="150" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/><text x="400" y="150" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#0f172a">CustomerQuery</text>
    <rect x="325" y="182" width="150" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/><text x="400" y="202" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#0f172a">TravellerActivity</text>
    <rect x="325" y="234" width="150" height="40" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="400" y="254" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#2563eb">ActivitySummary ←新</text>
