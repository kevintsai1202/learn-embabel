<text x="400" y="50" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">action 輸出寫入 blackboard，下一個 action 依型別與名稱 binding</text>

