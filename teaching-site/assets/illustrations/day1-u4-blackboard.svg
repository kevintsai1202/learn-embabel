    <text x="400" y="375" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="600" fill="#64748b">不是魔法字串 map：物件依型別與名稱綁定到 method parameters</text>
  
