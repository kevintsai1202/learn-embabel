<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><polygon points="0,0 10,5 0,10" fill="#64748b"/></marker></defs>
<rect width="800" height="400" rx="12" fill="#f8fafc"/>
<text x="400" y="30" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="15" font-weight="700" fill="#0f172a">Type-driven flow：方法簽章就是流程宣告</text>
<text x="400" y="50" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="600" fill="#64748b">Java record 在 action 之間流動，planner 依型別推導順序</text>

    <rect x="30" y="160" width="150" height="56" rx="28" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text x="105" y="188" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#2563eb">TravellerActivity</text>
    <rect x="230" y="150" width="160" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="310" y="175" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#7c3aed">summarize(</text><text x="310" y="190" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#7c3aed">TravellerActivity a)</text><text x="310" y="205" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#7c3aed">→ ActivitySummary</text>
    <rect x="440" y="160" width="130" height="56" rx="28" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text x="505" y="188" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="700" fill="#d97706">ActivitySummary</text>
    <rect x="620" y="150" width="150" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="695" y="175" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#7c3aed">proposeOffer(</text><text x="695" y="190" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#7c3aed">ActivitySummary s)</text><text x="695" y="205" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="11" font-weight="700" fill="#7c3aed">→ OfferDraft</text>
    <line x1="182" y1="190" x2="226" y2="190" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="392" y1="190" x2="436" y2="190" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <line x1="572" y1="190" x2="616" y2="190" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <rect x="300" y="290" width="200" height="50" rx="25" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text x="400" y="315" text-anchor="middle" dominant-baseline="central" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="13" font-weight="700" fill="#16a34a">OfferDraft → 審核</text>
    <line x1="695" y1="232" x2="504" y2="310" stroke="#64748b" stroke-width="2"  marker-end="url(#arrow)"/>
    <text x="400" y="130" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="600" fill="#64748b">record＝資料邊界：表達形狀・支援 refactor・避免魔法字串</text>
    <text x="400" y="380" text-anchor="middle" font-family="system-ui,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="12" font-weight="600" fill="#64748b">下一個 action 需要 ActivitySummary，planner 就知道它要等 summarize 之後執行</text>
  
</svg>